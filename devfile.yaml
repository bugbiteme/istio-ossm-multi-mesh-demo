schemaVersion: 2.2.0

metadata:
  name: k8s-kustomize-workspace
  version: 1.0.0

components:
  - name: tools
    container:
      # Universal Developer Image — includes git, curl, kubectl, and common runtimes.
      # Swap for a custom image if you want tools pre-baked (faster cold starts).
      image: quay.io/devfile/universal-developer-image:ubi9-latest
      memoryLimit: 4Gi
      memoryRequest: 512Mi
      cpuLimit: "2"
      cpuRequest: "500m"
      mountSources: true

      env:
        # Git identity — used by the configure-git postStart command
        - name: GIT_USER_EMAIL
          value: "leon.s.levy@gmail.com"
        - name: GIT_USER_NAME
          value: "bugbiteme"

        # Ensure $HOME/.local/bin and nvm-managed node are on PATH
        - name: PATH
          value: "/home/user/.local/bin:/home/user/.nvm/versions/node/default/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

        # Environment Variables needed for setting up and running istio demo (found in scripts/00-export.sh)
        - name: CTX_EAST
          value: "admin-east"
        - name: CTX_WEST
          value: "admin-west"
        - name: ISTIO_VERSION
          value: "1.27.5"
        - name: MESH_ID
          value: "mesh1"
        - name: EAST_CLUSTER
          value: "cluster-east"
        - name: WEST_CLUSTER
          value: "cluster-west"
        - name: EAST_NETWORK
          value: "network1"
        - name: WEST_NETWORK
          value: "network2"

        # --- Add your environment variables below ---
        # These are set globally in the container at startup (unlike shell exports
        # in a script, which only live for that session).
        #
        # - name: MY_VAR
        #   value: "my-value"
        # - name: KUBECONFIG
        #   value: "/home/user/.kube/config"

      # Expose ports if your app or tooling needs them (uncomment as needed)
      # endpoints:
      #   - name: app
      #     targetPort: 8080
      #   - name: metrics
      #     targetPort: 9090

# ---------------------------------------------------------------------------
# Commands — each can be run manually from the IDE's "Run Task" menu,
# and the postStart block below wires the install commands to run automatically
# on every workspace start.
# ---------------------------------------------------------------------------
commands:

  # 1. Git identity
  - id: configure-git
    exec:
      label: "Setup: Configure Git identity"
      component: tools
      commandLine: |
        git config --global user.email "${GIT_USER_EMAIL}"
        git config --global user.name "${GIT_USER_NAME}"
        echo "✔ Git configured as ${GIT_USER_NAME} <${GIT_USER_EMAIL}>"

  # 2. Node.js 24 (via nvm — no sudo required) + Claude Code
  #    nvm installs to ~/.nvm which is on the persistent home volume.
  #    On first run this downloads nvm + Node 24; subsequent restarts are instant.
  - id: install-nodejs
    exec:
      label: "Setup: Install Node.js 24 (nvm) + Claude Code"
      component: tools
      commandLine: |
        export NVM_DIR="$HOME/.nvm"

        # Install nvm if not present
        if [ ! -s "$NVM_DIR/nvm.sh" ]; then
          echo "→ Installing nvm..."
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
        fi

        # Source nvm for this session
        [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"

        # Install Node 24 if not already active
        if ! node --version 2>/dev/null | grep -q "^v24"; then
          echo "→ Installing Node.js 24..."
          nvm install 24
          nvm alias default 24
        else
          echo "✔ Node.js $(node --version) already installed"
        fi

        # Install claude-code globally via npm (goes into nvm's node_modules — persistent)
        if ! command -v claude &>/dev/null; then
          echo "→ Installing @anthropic-ai/claude-code..."
          npm install -g @anthropic-ai/claude-code
        else
          echo "✔ claude-code already installed"
        fi

  # 3. istioctl
  - id: install-istio
    exec:
      label: "Setup: Install istioctl 1.27.5"
      component: tools
      commandLine: |
        ISTIO_VERSION="1.27.5"
        INSTALL_DIR="$HOME/.local/bin"
        mkdir -p "$INSTALL_DIR"

        if command -v istioctl &>/dev/null; then
          echo "✔ istioctl $(istioctl version --client --short 2>/dev/null || istioctl version --client) already installed"
        else
          echo "→ Installing istioctl ${ISTIO_VERSION}..."
          curl -sSL https://istio.io/downloadIstio | ISTIO_VERSION="${ISTIO_VERSION}" TARGET_ARCH="$(uname -m)" sh -
          mv "istio-${ISTIO_VERSION}/bin/istioctl" "$INSTALL_DIR/"
          rm -rf "istio-${ISTIO_VERSION}"
          echo "✔ istioctl ${ISTIO_VERSION} installed to ${INSTALL_DIR}"
        fi

  # 4. kustomize
  - id: install-kustomize
    exec:
      label: "Setup: Install kustomize (latest)"
      component: tools
      commandLine: |
        INSTALL_DIR="$HOME/.local/bin"
        mkdir -p "$INSTALL_DIR"

        if command -v kustomize &>/dev/null; then
          echo "✔ $(kustomize version) already installed"
        else
          echo "→ Installing kustomize..."
          curl -sSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          mv kustomize "$INSTALL_DIR/"
          echo "✔ kustomize installed to ${INSTALL_DIR}"
        fi

  # 5. Helm
  - id: install-helm
    exec:
      label: "Setup: Install Helm (latest stable)"
      component: tools
      commandLine: |
        INSTALL_DIR="$HOME/.local/bin"
        mkdir -p "$INSTALL_DIR"

        if command -v helm &>/dev/null; then
          echo "✔ $(helm version --short) already installed"
        else
          echo "→ Installing Helm..."
          export HELM_INSTALL_DIR="$INSTALL_DIR"
          export USE_SUDO="false"
          curl -sSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          echo "✔ Helm installed to ${INSTALL_DIR}"
        fi

  # 6. Ansible + AWS collection + boto3 (all via pip --user, no sudo required)
  #    Installs to ~/.local which is on the persistent home volume.
  - id: install-ansible
    exec:
      label: "Setup: Install Ansible + AWS collection + boto3"
      component: tools
      commandLine: |
        if ! command -v ansible &>/dev/null; then
          echo "→ Installing ansible-core..."
          pip install ansible-core --user
        else
          echo "✔ $(ansible --version | head -1) already installed"
        fi

        if ! ansible-galaxy collection list 2>/dev/null | grep -q "amazon.aws"; then
          echo "→ Installing amazon.aws collection..."
          ansible-galaxy collection install amazon.aws
        else
          echo "✔ amazon.aws collection already installed"
        fi

        if ! python3 -c "import boto3" &>/dev/null; then
          echo "→ Installing boto3..."
          pip install boto3 --user
        else
          echo "✔ boto3 already installed"
        fi

  # Convenience: run the full setup in one shot (useful for manual re-runs)
  - id: full-setup
    exec:
      label: "Setup: Run full workspace setup"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: |
        export NVM_DIR="$HOME/.nvm"

        echo "=== Git ===" && \
        git config --global user.email "${GIT_USER_EMAIL}" && \
        git config --global user.name "${GIT_USER_NAME}" && \

        echo "=== Node.js (nvm) ===" && \
        ([ ! -s "$NVM_DIR/nvm.sh" ] && curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash || true) && \
        source "$NVM_DIR/nvm.sh" && \
        (node --version 2>/dev/null | grep -q "^v24" || (nvm install 24 && nvm alias default 24)) && \
        (command -v claude &>/dev/null || npm install -g @anthropic-ai/claude-code) && \

        echo "=== istioctl ===" && \
        (command -v istioctl &>/dev/null || (curl -sSL https://istio.io/downloadIstio | ISTIO_VERSION=1.27.5 sh - && mv istio-1.27.5/bin/istioctl "$HOME/.local/bin/" && rm -rf istio-1.27.5)) && \

        echo "=== kustomize ===" && \
        (command -v kustomize &>/dev/null || (curl -sSL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash && mv kustomize "$HOME/.local/bin/")) && \

        echo "=== helm ===" && \
        (command -v helm &>/dev/null || (export HELM_INSTALL_DIR="$HOME/.local/bin" && export USE_SUDO=false && curl -sSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash)) && \

        echo "=== ansible ===" && \
        (command -v ansible &>/dev/null || pip install ansible-core --user) && \
        (ansible-galaxy collection list 2>/dev/null | grep -q "amazon.aws" || ansible-galaxy collection install amazon.aws) && \
        (python3 -c "import boto3" &>/dev/null || pip install boto3 --user) && \

        echo "" && \
        echo "✔ Workspace setup complete!"

# ---------------------------------------------------------------------------
# Events — postStart commands run automatically when the workspace starts.
# They execute sequentially in the order listed.
# ---------------------------------------------------------------------------
events:
  postStart:
    - configure-git
    - install-nodejs
    - install-istio
    - install-kustomize
    - install-helm
    - install-ansible
