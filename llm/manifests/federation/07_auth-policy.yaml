apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: maas-auth
  namespace: llm
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: maas-route
  rules:
    authentication:
      "api-key-users":
        apiKey:
          selector:
            matchLabels:
              app: llm
        credentials:
          authorizationHeader:
            prefix: APIKEY
    response:
      unauthenticated:
        headers:
          content-type:
            value: application/json
        body:
          value: '{"message": "unauthorized"}'
      unauthorized:
        headers:
          content-type:
            value: application/json
        body:
          value: '{"message": "unauthorized"}'
      success:
        headers:
          "authorization":
            plain:
              selector: auth.identity.metadata.annotations.upstream-authorization
        filters:
          "identity":
            json:
              properties:
                "userid":
                  selector: auth.identity.metadata.annotations.secret\.kuadrant\.io/user-id