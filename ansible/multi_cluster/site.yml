---
# Multi-Mesh Demo – Full Deployment
#
# Usage:
#   ansible-playbook site.yml                     # run all steps
#   ansible-playbook site.yml --tags step5        # run a single step
#   ansible-playbook site.yml --skip-tags step2   # skip istioctl install (Dev Spaces)
#
# Available tags: preflight step1 step1_console step2 step3…step9 (no separate “verify” step; see preflight)
#   preflight = API checks for contexts that already exist in kubeconfig; step1_console = optional console banner (needs API)

- name: Multi-Mesh Demo – Full Deployment
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars/main.yml
  vars:
    # playbook_dir is unset/wrong while vars_files are templated; paths must use play vars.
    repo_root: "{{ (playbook_dir ~ '/../..') | realpath }}"

  pre_tasks:
    # Skip when only step1: kubeconfig / oc login only (no API checks).
    # If a named context is missing (fresh kubeconfig), skip that cluster’s API check until step1 created it.
    - name: Preflight | East block (probe context + API when present)
      tags: [always, preflight]
      when: >
        not (
          (ansible_run_tags | default([]) | length == 1) and
          ('step1' in (ansible_run_tags | default([]))) and
          ('preflight' not in (ansible_run_tags | default([])))
        )
      block:
        - name: Preflight | Probe east context presence
          ansible.builtin.command: oc config get-contexts {{ ctx_east }}
          register: preflight_probe_east
          failed_when: false
          changed_when: false

        - name: Preflight | OpenShift API reachability (east)
          ansible.builtin.import_tasks: ../includes/preflight_oc_api.yml
          vars:
            preflight_oc_context: "{{ ctx_east }}"
          when: preflight_probe_east.rc == 0

    - name: Preflight | West block (probe context + API when present)
      tags: [always, preflight]
      when: >
        not (
          (ansible_run_tags | default([]) | length == 1) and
          ('step1' in (ansible_run_tags | default([]))) and
          ('preflight' not in (ansible_run_tags | default([])))
        )
      block:
        - name: Preflight | Probe west context presence
          ansible.builtin.command: oc config get-contexts {{ ctx_west }}
          register: preflight_probe_west
          failed_when: false
          changed_when: false

        - name: Preflight | OpenShift API reachability (west)
          ansible.builtin.import_tasks: ../includes/preflight_oc_api.yml
          vars:
            preflight_oc_context: "{{ ctx_west }}"
          when: preflight_probe_west.rc == 0

  tasks:
    - name: "Step 1 | Rename contexts for east/west clusters"
      ansible.builtin.import_tasks: tasks/01_rename_contexts.yml
      tags: [step1]

    - name: "Step 2 | Install istioctl (skip with --skip-tags step2 for Dev Spaces)"
      ansible.builtin.import_tasks: tasks/02_install_istioctl.yml
      tags: [step2]

    - name: "Step 3 | Install operators on both clusters"
      ansible.builtin.import_tasks: tasks/03_install_operators.yml
      tags: [step3]

    - name: "Step 4 | User workload monitoring"
      ansible.builtin.import_tasks: tasks/04_user_workload_monitoring.yml
      tags: [step4]

    - name: "Step 5 | Create shared root CA"
      ansible.builtin.import_tasks: tasks/05_root_ca.yml
      tags: [step5]

    - name: "Step 6 | Install tracing system"
      ansible.builtin.import_tasks: tasks/06_tracing_system.yml
      tags: [step6]

    - name: "Step 7 | Install Istio resources"
      ansible.builtin.import_tasks: tasks/07_istio_resources.yml
      tags: [step7]

    - name: "Step 8 | Kiali deployment"
      ansible.builtin.import_tasks: tasks/08_kiali.yml
      tags: [step8]

    - name: "Step 9 | Bookinfo app"
      ansible.builtin.import_tasks: tasks/09_bookinfo.yml
      tags: [step9]
