---
# Step 4: Install operators and enable user workload monitoring on both clusters

# --- 4.0 Install operators ---

- name: "[4] Apply operators kustomization (east)"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}" apply -k {{ repo_root }}/manifests/operators/
  changed_when: true
  tags: [step4]

- name: "[4] Apply operators kustomization (west)"
  ansible.builtin.command: >
    oc --context="{{ ctx_west }}" apply -k {{ repo_root }}/manifests/operators/
  changed_when: true
  tags: [step4]

# --- 4.1 Verify operators reach Succeeded phase ---

- name: "[4.1] Check current CSV phases (east)"
  ansible.builtin.shell: |
    oc --context="{{ ctx_east }}" get csv -n openshift-operators \
      -o jsonpath='{.items[*].status.phase}' | tr ' ' '\n' | sort -u
  register: east_csv_phases_pre
  changed_when: false
  tags: [step4]

- name: "[4.1] Wait for CSVs to reach Succeeded (east)"
  ansible.builtin.shell: |
    oc --context="{{ ctx_east }}" get csv -n openshift-operators \
      -o jsonpath='{.items[*].status.phase}' | tr ' ' '\n' | sort -u
  register: east_csv_phases
  until: >-
    east_csv_phases.stdout | length > 0 and
    'Installing' not in east_csv_phases.stdout and
    'Pending' not in east_csv_phases.stdout
  retries: 30
  delay: 20
  changed_when: false
  when: >-
    east_csv_phases_pre.stdout | length == 0 or
    'Installing' in east_csv_phases_pre.stdout or
    'Pending' in east_csv_phases_pre.stdout
  tags: [step4]

- name: "[4.1] Check current CSV phases (west)"
  ansible.builtin.shell: |
    oc --context="{{ ctx_west }}" get csv -n openshift-operators \
      -o jsonpath='{.items[*].status.phase}' | tr ' ' '\n' | sort -u
  register: west_csv_phases_pre
  changed_when: false
  tags: [step4]

- name: "[4.1] Wait for CSVs to reach Succeeded (west)"
  ansible.builtin.shell: |
    oc --context="{{ ctx_west }}" get csv -n openshift-operators \
      -o jsonpath='{.items[*].status.phase}' | tr ' ' '\n' | sort -u
  register: west_csv_phases
  until: >-
    west_csv_phases.stdout | length > 0 and
    'Installing' not in west_csv_phases.stdout and
    'Pending' not in west_csv_phases.stdout
  retries: 30
  delay: 20
  changed_when: false
  when: >-
    west_csv_phases_pre.stdout | length == 0 or
    'Installing' in west_csv_phases_pre.stdout or
    'Pending' in west_csv_phases_pre.stdout
  tags: [step4]

- name: "[4.1] Show CSV phases (east)"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}" get csv -n openshift-operators
    -o custom-columns=NAME:.metadata.name,PHASE:.status.phase
  changed_when: false
  tags: [step4]

- name: "[4.1] Show CSV phases (west)"
  ansible.builtin.command: >
    oc --context="{{ ctx_west }}" get csv -n openshift-operators
    -o custom-columns=NAME:.metadata.name,PHASE:.status.phase
  changed_when: false
  tags: [step4]

# --- 4.2 Enable user workload monitoring ---

- name: "[4.2] Enable user workload monitoring (east)"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}" apply
    -f {{ repo_root }}/manifests/monitoring/user-workload-monitoring.yaml
  changed_when: true
  tags: [step4]

- name: "[4.2] Enable user workload monitoring (west)"
  ansible.builtin.command: >
    oc --context="{{ ctx_west }}" apply
    -f {{ repo_root }}/manifests/monitoring/user-workload-monitoring.yaml
  changed_when: true
  tags: [step4]

- name: "[4.2] Wait for prometheus-user-workload rollout (east)"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}" rollout status statefulset prometheus-user-workload
    -n openshift-user-workload-monitoring --timeout=180s
  changed_when: false
  tags: [step4]

- name: "[4.2] Wait for prometheus-user-workload rollout (west)"
  ansible.builtin.command: >
    oc --context="{{ ctx_west }}" rollout status statefulset prometheus-user-workload
    -n openshift-user-workload-monitoring --timeout=180s
  changed_when: false
  tags: [step4]
