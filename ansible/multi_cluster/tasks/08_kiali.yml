---
# Step 8: Kiali deployment on both clusters

# --- Extract Tempo signing CA and create cacert secret ---

- name: "[8] Read Tempo signing CA certificate from cluster (east)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: v1
    kind: Secret
    name: tempo-sample-signing-ca
    namespace: tracing-system
  register: east_tempo_ca_secret
  failed_when: east_tempo_ca_secret.resources | length == 0
  tags: [step8]

- name: "[8] Write Tempo signing CA to local file (east)"
  ansible.builtin.copy:
    dest: "{{ repo_root }}/certs/ca-east.crt"
    content: "{{ east_tempo_ca_secret.resources[0].data['tls.crt'] | b64decode }}"
    mode: "0600"
  tags: [step8]

- name: "[8] Create cacert secret in istio-system (east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: cacert
        namespace: istio-system
      type: Opaque
      stringData:
        ca.crt: "{{ lookup('ansible.builtin.file', repo_root ~ '/certs/ca-east.crt') }}"
    state: present
    apply: true
  tags: [step8]

- name: "[8] Read Tempo signing CA certificate from cluster (west)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_west }}"
    api_version: v1
    kind: Secret
    name: tempo-sample-signing-ca
    namespace: tracing-system
  register: west_tempo_ca_secret
  failed_when: west_tempo_ca_secret.resources | length == 0
  when: multi_cluster | bool
  tags: [step8]

- name: "[8] Write Tempo signing CA to local file (west)"
  ansible.builtin.copy:
    dest: "{{ repo_root }}/certs/ca-west.crt"
    content: "{{ west_tempo_ca_secret.resources[0].data['tls.crt'] | b64decode }}"
    mode: "0600"
  when: multi_cluster | bool
  tags: [step8]

- name: "[8] Create cacert secret in istio-system (west)"
  kubernetes.core.k8s:
    context: "{{ ctx_west }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: cacert
        namespace: istio-system
      type: Opaque
      stringData:
        ca.crt: "{{ lookup('ansible.builtin.file', repo_root ~ '/certs/ca-west.crt') }}"
    state: present
    apply: true
  when: multi_cluster | bool
  tags: [step8]

# --- Apply Kiali CR ---

- name: "[8] Apply Kiali manifests (east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    src: "{{ item }}"
    state: present
    apply: true
  loop:
    - "{{ repo_root }}/manifests/ossm/kiali/kiali-monitoring-rbac.yaml"
    - "{{ repo_root }}/manifests/ossm/kiali/kiali-ossmc.yaml"
    - "{{ repo_root }}/manifests/ossm/kiali/kiali.yaml"
  tags: [step8]

- name: "[8] Apply Kiali manifests (west)"
  kubernetes.core.k8s:
    context: "{{ ctx_west }}"
    src: "{{ item }}"
    state: present
    apply: true
  loop:
    - "{{ repo_root }}/manifests/ossm/kiali/kiali-monitoring-rbac.yaml"
    - "{{ repo_root }}/manifests/ossm/kiali/kiali-ossmc.yaml"
    - "{{ repo_root }}/manifests/ossm/kiali/kiali.yaml"
  when: multi_cluster | bool
  tags: [step8]

- name: "[8] Wait for Kiali deployment to be ready (east)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: apps/v1
    kind: Deployment
    name: kiali
    namespace: istio-system
  register: east_kiali_dep
  until: >
    east_kiali_dep.resources | length > 0 and
    (east_kiali_dep.resources[0].status.replicas | default(0) | int) > 0 and
    (east_kiali_dep.resources[0].status.readyReplicas | default(0) | int) >=
    (east_kiali_dep.resources[0].status.replicas | default(0) | int)
  retries: 60
  delay: 5
  tags: [step8]

- name: "[8] Wait for Kiali deployment to be ready (west)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_west }}"
    api_version: apps/v1
    kind: Deployment
    name: kiali
    namespace: istio-system
  register: west_kiali_dep
  until: >
    west_kiali_dep.resources | length > 0 and
    (west_kiali_dep.resources[0].status.replicas | default(0) | int) > 0 and
    (west_kiali_dep.resources[0].status.readyReplicas | default(0) | int) >=
    (west_kiali_dep.resources[0].status.replicas | default(0) | int)
  retries: 60
  delay: 5
  when: multi_cluster | bool
  tags: [step8]
