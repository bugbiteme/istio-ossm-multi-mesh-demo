---
# Step 8: Kiali deployment on both clusters

# --- Extract Tempo signing CA and create cacert secret ---

- name: "[8] Extract Tempo signing CA certificate (east)"
  ansible.builtin.shell: |
    oc --context="{{ ctx_east }}" get secret tempo-sample-signing-ca \
      -n tracing-system \
      -o jsonpath='{.data.tls\.crt}' | base64 -d > {{ repo_root }}/certs/ca-east.crt
  changed_when: true
  tags: [step8]

- name: "[8] Create cacert secret in istio-system (east)"
  ansible.builtin.shell: |
    oc --context="{{ ctx_east }}" create secret generic cacert \
      --from-file=ca.crt={{ repo_root }}/certs/ca-east.crt \
      -n istio-system \
      --dry-run=client -o yaml | oc --context="{{ ctx_east }}" apply -f -
  changed_when: true
  tags: [step8]

- name: "[8] Extract Tempo signing CA certificate (west)"
  ansible.builtin.shell: |
    oc --context="{{ ctx_west }}" get secret tempo-sample-signing-ca \
      -n tracing-system \
      -o jsonpath='{.data.tls\.crt}' | base64 -d > {{ repo_root }}/certs/ca-west.crt
  changed_when: true
  tags: [step8]

- name: "[8] Create cacert secret in istio-system (west)"
  ansible.builtin.shell: |
    oc --context="{{ ctx_west }}" create secret generic cacert \
      --from-file=ca.crt={{ repo_root }}/certs/ca-west.crt \
      -n istio-system \
      --dry-run=client -o yaml | oc --context="{{ ctx_west }}" apply -f -
  changed_when: true
  tags: [step8]

# --- Apply Kiali CR ---

- name: "[8] Apply Kiali CR (east)"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}" apply -f {{ repo_root }}/manifests/ossm/kiali/
  changed_when: true
  tags: [step8]

- name: "[8] Apply Kiali CR (west)"
  ansible.builtin.command: >
    oc --context="{{ ctx_west }}" apply -f {{ repo_root }}/manifests/ossm/kiali/
  changed_when: true
  tags: [step8]

- name: "[8] Wait for Kiali deployment to be ready (east)"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}" rollout status deployment kiali -n istio-system
  changed_when: false
  tags: [step8]

- name: "[8] Wait for Kiali deployment to be ready (west)"
  ansible.builtin.command: >
    oc --context="{{ ctx_west }}" rollout status deployment kiali -n istio-system
  changed_when: false
  tags: [step8]
