---
# Step 9: Deploy the Bookinfo app and validate access

# --- 9.1 / 9.2 Deploy app on both clusters ---

- name: "[9.1] Deploy Bookinfo app (east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    definition: "{{ lookup('kubernetes.core.kustomize', dir=repo_root ~ '/manifests/bookinfo/app/east') }}"
    state: present
    apply: true
  tags: [step9]

- name: "[9.2] Deploy Bookinfo app (west)"
  kubernetes.core.k8s:
    context: "{{ ctx_west }}"
    definition: "{{ lookup('kubernetes.core.kustomize', dir=repo_root ~ '/manifests/bookinfo/app/west') }}"
    state: present
    apply: true
  tags: [step9]

# --- 9.3 Collect gateway URL ---

- name: "[9.3] Get ingress gateway host and HTTP port"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: gateway.networking.k8s.io/v1
    kind: Gateway
    name: prod-gateway
    namespace: ingress-gateway
  register: prod_gw
  until: >
    prod_gw.resources | length > 0 and
    (prod_gw.resources[0].status.addresses | default([]) | length) > 0
  retries: 10
  delay: 10
  tags: [step9]

- name: "[9.3] Set gateway URL fact"
  ansible.builtin.set_fact:
    gateway_url: >-
      {{ prod_gw.resources[0].status.addresses[0].value }}:{{
      prod_gw.resources[0].spec.listeners
      | selectattr('name', 'equalto', 'http')
      | map(attribute='port')
      | first }}
  tags: [step9]

- name: "[9.3] Show productpage URL"
  ansible.builtin.debug:
    msg: "Productpage URL: http://{{ gateway_url }}/productpage"
  tags: [step9]

# --- 9.3 Verify productpage ---

- name: "[9.3] Verify productpage returns the expected title"
  ansible.builtin.uri:
    url: "http://{{ gateway_url }}/productpage"
    return_content: true
  register: productpage_response
  until: "'Simple Bookstore App' in productpage_response.content"
  retries: 10
  delay: 15
  tags: [step9]

- name: "[9.3] Confirm productpage is reachable"
  ansible.builtin.debug:
    msg: "Productpage responded with HTTP {{ productpage_response.status }}"
  tags: [step9]

# --- 9.4 Verify ratings API ---

- name: "[9.4] Verify ratings API endpoint"
  ansible.builtin.uri:
    url: "http://{{ gateway_url }}/api/v1/products/0/ratings"
    return_content: true
    status_code: [200, 503]
  register: ratings_response
  tags: [step9]

- name: "[9.4] Show ratings API response"
  ansible.builtin.debug:
    msg: "Ratings API HTTP status: {{ ratings_response.status }}"
  tags: [step9]

# --- 9.5 Load generators (optional) ---

- name: "[9.5] Start web load generator in background (optional)"
  ansible.builtin.shell: "nohup sh {{ repo_root }}/scripts/loadgen-web.sh &"
  when: start_load_generators | default(false) | bool
  changed_when: true
  tags: [step9]

- name: "[9.5] Start API load generator in background (optional)"
  ansible.builtin.shell: "nohup sh {{ repo_root }}/scripts/loadgen-api.sh &"
  when: start_load_generators | default(false) | bool
  changed_when: true
  tags: [step9]

- name: "[9.5] Load generator note"
  ansible.builtin.debug:
    msg: >
      Load generators are NOT started automatically.
      To start them, set start_load_generators: true in vars/main.yml
      or run: sh scripts/loadgen-web.sh  and  sh scripts/loadgen-api.sh
  when: not (start_load_generators | default(false) | bool)
  tags: [step9]
