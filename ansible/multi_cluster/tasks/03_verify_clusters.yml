---
# Step 3: Verify connectivity to both clusters

- name: "[3] Verify east cluster is reachable"
  ansible.builtin.command: "oc --context={{ ctx_east }} cluster-info"
  register: east_cluster_info
  changed_when: false
  tags: [step3]

- name: "[3] Show east cluster info"
  ansible.builtin.debug:
    msg: "{{ east_cluster_info.stdout_lines }}"
  tags: [step3]

- name: "[3] Show east cluster version"
  ansible.builtin.command: "oc --context={{ ctx_east }} version"
  register: east_version
  changed_when: false
  tags: [step3]

- name: "[3] Show east cluster version output"
  ansible.builtin.debug:
    msg: "{{ east_version.stdout_lines }}"
  tags: [step3]

- name: "[3] Verify west cluster is reachable"
  ansible.builtin.command: "oc --context={{ ctx_west }} cluster-info"
  register: west_cluster_info
  changed_when: false
  tags: [step3]

- name: "[3] Show west cluster info"
  ansible.builtin.debug:
    msg: "{{ west_cluster_info.stdout_lines }}"
  tags: [step3]

- name: "[3] Show west cluster version"
  ansible.builtin.command: "oc --context={{ ctx_west }} version"
  register: west_version
  changed_when: false
  tags: [step3]

- name: "[3] Show west cluster version output"
  ansible.builtin.debug:
    msg: "{{ west_version.stdout_lines }}"
  tags: [step3]
