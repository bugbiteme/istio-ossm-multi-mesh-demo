---
# Step 15: DNSPolicy for prod-gateway (rhcl/README.md §5 steps 10–11)

- name: "[15.1] Apply DNSPolicy (ingress-gateway, east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    definition: "{{ lookup('file', repo_root ~ '/rhcl/manifests/dns/dns-pol.yaml') | from_yaml }}"
    state: present
    apply: true
  tags: [step15]

- name: "[15.1] Apply DNSPolicy (ingress-gateway, west)"
  kubernetes.core.k8s:
    context: "{{ ctx_west }}"
    definition: "{{ lookup('file', repo_root ~ '/rhcl/manifests/dns/dns-pol.yaml') | from_yaml }}"
    state: present
    apply: true
  when: multi_cluster | bool
  tags: [step15]

- name: "[15.2] Wait for DNSPolicy Accepted and Enforced (east)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: kuadrant.io/v1
    kind: DNSPolicy
    name: prod-gateway-dnspolicy
    namespace: ingress-gateway
  register: rhcl_dns_policy_east
  until: >
    rhcl_dns_policy_east.resources | length > 0 and
    (
      rhcl_dns_policy_east.resources[0].status.conditions | default([])
      | selectattr('type', 'equalto', 'Accepted')
      | map(attribute='status')
      | first | default('')
      == 'True'
    ) and
    (
      rhcl_dns_policy_east.resources[0].status.conditions | default([])
      | selectattr('type', 'equalto', 'Enforced')
      | map(attribute='status')
      | first | default('')
      == 'True'
    )
  retries: 60
  delay: 15
  failed_when: >
    rhcl_dns_policy_east.resources | length > 0 and
    (
      (
        rhcl_dns_policy_east.resources[0].status.conditions | default([])
        | selectattr('type', 'equalto', 'Accepted')
        | map(attribute='status')
        | first | default('')
      ) == 'False'
    )
  tags: [step15]

- name: "[15.2] Wait for DNSPolicy Accepted and Enforced (west)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_west }}"
    api_version: kuadrant.io/v1
    kind: DNSPolicy
    name: prod-gateway-dnspolicy
    namespace: ingress-gateway
  register: rhcl_dns_policy_west
  until: >
    rhcl_dns_policy_west.resources | length > 0 and
    (
      rhcl_dns_policy_west.resources[0].status.conditions | default([])
      | selectattr('type', 'equalto', 'Accepted')
      | map(attribute='status')
      | first | default('')
      == 'True'
    ) and
    (
      rhcl_dns_policy_west.resources[0].status.conditions | default([])
      | selectattr('type', 'equalto', 'Enforced')
      | map(attribute='status')
      | first | default('')
      == 'True'
    )
  retries: 60
  delay: 15
  failed_when: >
    rhcl_dns_policy_west.resources | length > 0 and
    (
      (
        rhcl_dns_policy_west.resources[0].status.conditions | default([])
        | selectattr('type', 'equalto', 'Accepted')
        | map(attribute='status')
        | first | default('')
      ) == 'False'
    )
  when: multi_cluster | bool
  tags: [step15]

- name: "[15.3] DNSPolicy Accepted / Enforced messages (east)"
  ansible.builtin.debug:
    msg:
      accepted: >-
        {{ rhcl_dns_policy_east.resources[0].status.conditions | default([])
        | selectattr('type', 'equalto', 'Accepted')
        | map(attribute='message') | first | default('(none)') }}
      enforced: >-
        {{ rhcl_dns_policy_east.resources[0].status.conditions | default([])
        | selectattr('type', 'equalto', 'Enforced')
        | map(attribute='message') | first | default('(none)') }}
  tags: [step15]

- name: "[15.3] DNSPolicy Accepted / Enforced messages (west)"
  ansible.builtin.debug:
    msg:
      accepted: >-
        {{ rhcl_dns_policy_west.resources[0].status.conditions | default([])
        | selectattr('type', 'equalto', 'Accepted')
        | map(attribute='message') | first | default('(none)') }}
      enforced: >-
        {{ rhcl_dns_policy_west.resources[0].status.conditions | default([])
        | selectattr('type', 'equalto', 'Enforced')
        | map(attribute='message') | first | default('(none)') }}
  when: multi_cluster | bool
  tags: [step15]
