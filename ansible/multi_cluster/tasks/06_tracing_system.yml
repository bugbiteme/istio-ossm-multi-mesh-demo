---
# Step 6: Install the tracing system (MinIO + Tempo stack) on both clusters

- name: "[6] Apply tracing-system kustomization (east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    definition: "{{ lookup('kubernetes.core.kustomize', dir=repo_root ~ '/manifests/tracing-system') }}"
    state: present
    apply: true
  tags: [step6]

- name: "[6] Apply tracing-system kustomization (west)"
  kubernetes.core.k8s:
    context: "{{ ctx_west }}"
    definition: "{{ lookup('kubernetes.core.kustomize', dir=repo_root ~ '/manifests/tracing-system') }}"
    state: present
    apply: true
  tags: [step6]

# Avoid `oc wait pod --all`: during Deployments/STS rollouts, pod names disappear and wait fails with NotFound.
- name: "[6.1] Wait for tracing-system rollouts complete (east)"
  ansible.builtin.shell: |
    set -euo pipefail
    ctx="{{ ctx_east }}"
    ns=tracing-system
    oc --context="$ctx" get deploy -n "$ns" -o name | while read -r res; do
      oc --context="$ctx" rollout status "$res" -n "$ns" --timeout=600s
    done
    oc --context="$ctx" get sts -n "$ns" -o name | while read -r res; do
      oc --context="$ctx" rollout status "$res" -n "$ns" --timeout=600s
    done
  args:
    executable: /bin/bash
  changed_when: false
  tags: [step6]

- name: "[6.1] Wait for tracing-system rollouts complete (west)"
  ansible.builtin.shell: |
    set -euo pipefail
    ctx="{{ ctx_west }}"
    ns=tracing-system
    oc --context="$ctx" get deploy -n "$ns" -o name | while read -r res; do
      oc --context="$ctx" rollout status "$res" -n "$ns" --timeout=600s
    done
    oc --context="$ctx" get sts -n "$ns" -o name | while read -r res; do
      oc --context="$ctx" rollout status "$res" -n "$ns" --timeout=600s
    done
  args:
    executable: /bin/bash
  changed_when: false
  tags: [step6]
