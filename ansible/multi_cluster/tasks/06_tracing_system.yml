---
# Step 6: Install the tracing system (MinIO + Tempo stack) on both clusters

- name: "[6] Apply tracing-system kustomization (east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    definition: "{{ lookup('kubernetes.core.kustomize', dir=repo_root ~ '/manifests/tracing-system') }}"
    state: present
    apply: true
  tags: [step6]

- name: "[6] Apply tracing-system kustomization (west)"
  kubernetes.core.k8s:
    context: "{{ ctx_west }}"
    definition: "{{ lookup('kubernetes.core.kustomize', dir=repo_root ~ '/manifests/tracing-system') }}"
    state: present
    apply: true
  tags: [step6]

- name: "[6.1] Wait for all pods Ready in tracing-system (east)"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}"
    wait --for=condition=Ready pod --all -n tracing-system --timeout=600s
  changed_when: false
  tags: [step6]

- name: "[6.1] Wait for all pods Ready in tracing-system (west)"
  ansible.builtin.command: >
    oc --context="{{ ctx_west }}"
    wait --for=condition=Ready pod --all -n tracing-system --timeout=600s
  changed_when: false
  tags: [step6]
