---
# Step 5: Create the shared root CA and load it into cert-manager on both clusters

# --- 5.0 Generate root CA (runs once; skipped if files already exist) ---

- name: "[5] Check if root CA key already exists"
  ansible.builtin.stat:
    path: "{{ repo_root }}/certs/root-ca.key"
  register: root_ca_key_stat
  tags: [step5]

- name: "[5] Generate root CA private key"
  ansible.builtin.command: openssl genrsa -out root-ca.key 4096
  args:
    chdir: "{{ repo_root }}/certs"
    creates: "{{ repo_root }}/certs/root-ca.key"
  when: not root_ca_key_stat.stat.exists
  tags: [step5]

- name: "[5] Generate root CA CSR"
  ansible.builtin.command: >
    openssl req -new -key root-ca.key -config root-ca.conf -out root-ca.csr
  args:
    chdir: "{{ repo_root }}/certs"
    creates: "{{ repo_root }}/certs/root-ca.csr"
  when: not root_ca_key_stat.stat.exists
  tags: [step5]

- name: "[5] Self-sign root CA certificate"
  ansible.builtin.command: >
    openssl x509 -req -days 3650 -signkey root-ca.key
    -extensions req_ext -extfile root-ca.conf
    -in root-ca.csr -out root-ca.crt
  args:
    chdir: "{{ repo_root }}/certs"
    creates: "{{ repo_root }}/certs/root-ca.crt"
  when: not root_ca_key_stat.stat.exists
  tags: [step5]

# --- 5.1 Load root CA into cert-manager (both clusters) ---

- name: "[5.1] Ensure istio-system namespace exists (east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: istio-system
    state: present
    apply: true
  tags: [step5]

- name: "[5.1] Ensure istio-system namespace exists (west)"
  kubernetes.core.k8s:
    context: "{{ ctx_west }}"
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: istio-system
    state: present
    apply: true
  tags: [step5]

- name: "[5.1] Create root-ca-secret in cert-manager (east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: root-ca-secret
        namespace: cert-manager
      type: kubernetes.io/tls
      stringData:
        tls.crt: "{{ lookup('ansible.builtin.file', repo_root ~ '/certs/root-ca.crt') }}"
        tls.key: "{{ lookup('ansible.builtin.file', repo_root ~ '/certs/root-ca.key') }}"
    state: present
    apply: true
  tags: [step5]

- name: "[5.1] Create root-ca-secret in cert-manager (west)"
  kubernetes.core.k8s:
    context: "{{ ctx_west }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: root-ca-secret
        namespace: cert-manager
      type: kubernetes.io/tls
      stringData:
        tls.crt: "{{ lookup('ansible.builtin.file', repo_root ~ '/certs/root-ca.crt') }}"
        tls.key: "{{ lookup('ansible.builtin.file', repo_root ~ '/certs/root-ca.key') }}"
    state: present
    apply: true
  tags: [step5]

- name: "[5.1] Apply ClusterIssuer (east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    src: "{{ repo_root }}/manifests/cert-manager/clusterissuer.yaml"
    state: present
    apply: true
  tags: [step5]

- name: "[5.1] Apply ClusterIssuer (west)"
  kubernetes.core.k8s:
    context: "{{ ctx_west }}"
    src: "{{ repo_root }}/manifests/cert-manager/clusterissuer.yaml"
    state: present
    apply: true
  tags: [step5]

# --- 5.2 Issue intermediate CA certificates ---

- name: "[5.2] Apply east intermediate CA manifest"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    src: "{{ repo_root }}/manifests/cert-manager/east-intermediate-ca.yaml"
    state: present
    apply: true
  tags: [step5]

- name: "[5.2] Apply west intermediate CA manifest"
  kubernetes.core.k8s:
    context: "{{ ctx_west }}"
    src: "{{ repo_root }}/manifests/cert-manager/west-intermediate-ca.yaml"
    state: present
    apply: true
  tags: [step5]

- name: "[5.2] Wait for cacerts secret to be populated (east)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: v1
    kind: Secret
    name: cacerts
    namespace: istio-system
  register: east_cacerts
  until: >
    east_cacerts.resources | length > 0 and
    (east_cacerts.resources[0].data['ca.crt'] | default('') | length) > 0
  retries: 20
  delay: 15
  tags: [step5]

- name: "[5.2] Wait for cacerts secret to be populated (west)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_west }}"
    api_version: v1
    kind: Secret
    name: cacerts
    namespace: istio-system
  register: west_cacerts
  until: >
    west_cacerts.resources | length > 0 and
    (west_cacerts.resources[0].data['ca.crt'] | default('') | length) > 0
  retries: 20
  delay: 15
  tags: [step5]

- name: "[5.2] Confirm cacerts secrets are present"
  ansible.builtin.debug:
    msg:
      - "East cacerts: populated ({{ east_cacerts.resources[0].data['ca.crt'] | default('') | length }} chars base64)"
      - "West cacerts: populated ({{ west_cacerts.resources[0].data['ca.crt'] | default('') | length }} chars base64)"
  tags: [step5]
