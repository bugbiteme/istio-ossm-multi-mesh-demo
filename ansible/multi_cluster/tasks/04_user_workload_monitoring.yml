---
# Step 4: Enable user workload monitoring on both clusters

- name: "[4] Enable user workload monitoring (east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    src: "{{ repo_root }}/manifests/monitoring/user-workload-monitoring.yaml"
    state: present
    apply: true
  tags: [step4]

- name: "[4] Enable user workload monitoring (west)"
  kubernetes.core.k8s:
    context: "{{ ctx_west }}"
    src: "{{ repo_root }}/manifests/monitoring/user-workload-monitoring.yaml"
    state: present
    apply: true
  tags: [step4]

- name: "[4.1] Wait for prometheus-user-workload rollout (east)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: apps/v1
    kind: StatefulSet
    name: prometheus-user-workload
    namespace: openshift-user-workload-monitoring
  register: east_prom_uwm
  until: >
    east_prom_uwm.resources | length > 0 and
    (east_prom_uwm.resources[0].status.replicas | default(0) | int) > 0 and
    (east_prom_uwm.resources[0].status.readyReplicas | default(0) | int) >=
    (east_prom_uwm.resources[0].status.replicas | default(0) | int)
  retries: 36
  delay: 5
  tags: [step4]

- name: "[4.1] Wait for prometheus-user-workload rollout (west)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_west }}"
    api_version: apps/v1
    kind: StatefulSet
    name: prometheus-user-workload
    namespace: openshift-user-workload-monitoring
  register: west_prom_uwm
  until: >
    west_prom_uwm.resources | length > 0 and
    (west_prom_uwm.resources[0].status.replicas | default(0) | int) > 0 and
    (west_prom_uwm.resources[0].status.readyReplicas | default(0) | int) >=
    (west_prom_uwm.resources[0].status.replicas | default(0) | int)
  retries: 36
  delay: 5
  tags: [step4]
