---
# Step 1: Ensure east/west contexts exist in kubeconfig
#
# If `admin-east` / `admin-west` are missing, the playbook runs `oc login` using
# multi_cluster_* values (from OSSM_MULTI_* environment variables or -e); then
# renames the new context to the stable names in vars/main.yml.

# --- 1.1 East cluster ---

- name: "[1.1] Check whether east context already exists"
  ansible.builtin.command: oc config get-contexts {{ ctx_east }}
  register: east_ctx_check
  failed_when: false
  changed_when: false
  tags: [step1]

- name: "[1.1] Require east cluster credentials when kubeconfig lacks {{ ctx_east }}"
  ansible.builtin.assert:
    that:
      - multi_cluster_east_api | default('', true) | string | length > 0
      - multi_cluster_east_user | default('', true) | string | length > 0
      - multi_cluster_east_password | default('', true) | string | length > 0
    fail_msg: >-
      Target context {{ ctx_east }} is not in kubeconfig. Export OSSM_MULTI_EAST_API,
      OSSM_MULTI_EAST_USER, and OSSM_MULTI_EAST_PASSWORD (or pass -e multi_cluster_east_*), then re-run --tags step1.
  when: east_ctx_check.rc != 0
  tags: [step1]

- name: "[1.1] Log into east cluster API"
  ansible.builtin.command:
    argv: "{{ _east_login_argv }}"
  vars:
    _east_login_base: "{{ ['oc', 'login', multi_cluster_east_api, '-u', multi_cluster_east_user, '-p', multi_cluster_east_password] }}"
    _east_login_argv: "{{ _east_login_base + (['--insecure-skip-tls-verify=true'] if multi_cluster_oc_login_insecure_skip_tls_verify | bool else []) }}"
  no_log: true
  when: east_ctx_check.rc != 0
  changed_when: true
  tags: [step1]

- name: "[1.1] Get current context to rename (east)"
  ansible.builtin.command: oc config current-context
  register: current_ctx_east
  changed_when: false
  when: east_ctx_check.rc != 0
  tags: [step1]

- name: "[1.1] Rename current context to {{ ctx_east }}"
  ansible.builtin.command: "oc config rename-context {{ current_ctx_east.stdout | trim }} {{ ctx_east }}"
  when: east_ctx_check.rc != 0
  changed_when: true
  tags: [step1]

- name: "[1.1] Switch active context to {{ ctx_east }}"
  ansible.builtin.command: "oc config use-context {{ ctx_east }}"
  changed_when: true
  tags: [step1]

# Not tagged step1: needs a reachable API (VPN/DNS). Run with --tags step1_console when ready.
- name: "[1.1] Apply east console notification banner (optional)"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}"
    apply -f {{ repo_root }}/manifests/cluster/east/console-notification.yaml
  when: apply_console_notifications | bool
  changed_when: true
  tags: [step1_console]

# --- 1.2 West cluster ---

- name: "[1.2] Check whether west context already exists"
  ansible.builtin.command: oc config get-contexts {{ ctx_west }}
  register: west_ctx_check
