      - multi_cluster_west_api | default('', true) | string | length > 0
      - multi_cluster_west_user | default('', true) | string | length > 0
      - multi_cluster_west_password | default('', true) | string | length > 0
    fail_msg: >-
      Target context {{ ctx_west }} is not in kubeconfig. Export OSSM_MULTI_WEST_API,
      OSSM_MULTI_WEST_USER, and OSSM_MULTI_WEST_PASSWORD (or pass -e multi_cluster_west_*), then re-run --tags step1.
  when: west_ctx_check.rc != 0
