---
# Step 1: Expect kubeconfig contexts {{ ctx_east }} and {{ ctx_west }} to exist.
# Follow the repository README (§1.1 East cluster, §1.2 West cluster): log into each
# cluster, rename contexts to admin-east / admin-west, then run this playbook.

# --- 1.1 East cluster ---

- name: "[1.1] Check kubeconfig context {{ ctx_east }}"
  ansible.builtin.command: oc config get-contexts {{ ctx_east }}
  register: east_ctx_check
  changed_when: false
  failed_when: false
  tags: [step1]

- name: "[1.1] Require kubeconfig context (see README §1.1): {{ ctx_east }}"
  ansible.builtin.assert:
    that:
      - east_ctx_check.rc == 0
    fail_msg: >-
      Context {{ ctx_east }} is missing from kubeconfig. Log into the east cluster,
      run oc config rename-context on the current context to {{ ctx_east }}, then re-run
      (see repository README.md §1.1 East cluster).
  tags: [step1]

- name: "[1.1] Switch active context to {{ ctx_east }}"
  ansible.builtin.command: "oc config use-context {{ ctx_east }}"
  changed_when: true
  tags: [step1]

# Skipped when apply_console_notifications is false. Best-effort: does not fail step1 if API is unreachable.
- name: "[1.1] Apply east console notification banner (optional)"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}"
    apply -f {{ repo_root }}/manifests/cluster/east/console-notification.yaml
  when: apply_console_notifications | bool
  register: east_console_banner
  failed_when: false
  changed_when: east_console_banner.rc == 0
  tags: [step1]

- name: "[1.1] Warn when east console banner was not applied"
  ansible.builtin.debug:
    msg:
      - "East console notification was not applied (oc apply rc={{ east_console_banner.rc | default('n/a') }})."
      - >-
          Ensure the API in kubeconfig is reachable from this host
          (e.g. oc --context={{ ctx_east }} cluster-info), then re-run --tags step1,
          or set apply_console_notifications: false.
      - "stderr: {{ (east_console_banner.stderr | default('')) | trim }}"
  when:
    - apply_console_notifications | bool
    - not (east_console_banner.skipped | default(false))
    - (east_console_banner.rc | default(-1)) != 0
  tags: [step1]

# --- 1.2 West cluster ---

- name: "[1.2] Check kubeconfig context {{ ctx_west }}"
  ansible.builtin.command: oc config get-contexts {{ ctx_west }}
  register: west_ctx_check
  changed_when: false
  failed_when: false
  tags: [step1]

- name: "[1.2] Require kubeconfig context (see README §1.2): {{ ctx_west }}"
  ansible.builtin.assert:
    that:
      - west_ctx_check.rc == 0
    fail_msg: >-
      Context {{ ctx_west }} is missing from kubeconfig. Log into the west cluster,
      run oc config rename-context on the current context to {{ ctx_west }}, then re-run
      (see repository README.md §1.2 West cluster).
  tags: [step1]

- name: "[1.2] Switch active context to {{ ctx_west }}"
  ansible.builtin.command: "oc config use-context {{ ctx_west }}"
  changed_when: true
  tags: [step1]

# Skipped when apply_console_notifications is false. Best-effort: does not fail step1 if API is unreachable.
- name: "[1.2] Apply west console notification banner (optional)"
  ansible.builtin.command: >
    oc --context="{{ ctx_west }}"
    apply -f {{ repo_root }}/manifests/cluster/west/console-notification.yaml
  when: apply_console_notifications | bool
  register: west_console_banner
  failed_when: false
  changed_when: west_console_banner.rc == 0
  tags: [step1]

- name: "[1.2] Warn when west console banner was not applied"
  ansible.builtin.debug:
    msg:
      - "West console notification was not applied (oc apply rc={{ west_console_banner.rc | default('n/a') }})."
      - >-
          Ensure the API in kubeconfig is reachable from this host
          (e.g. oc --context={{ ctx_west }} cluster-info), then re-run --tags step1,
          or set apply_console_notifications: false.
      - "stderr: {{ (west_console_banner.stderr | default('')) | trim }}"
  when:
    - apply_console_notifications | bool
    - not (west_console_banner.skipped | default(false))
    - (west_console_banner.rc | default(-1)) != 0
  tags: [step1]
