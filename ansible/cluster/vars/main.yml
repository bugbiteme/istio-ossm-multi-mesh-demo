---
# Cluster contexts – must match names from repository README §1.1 / §1.2 (rename after oc login)
ctx_east: admin-east
ctx_west: admin-west

# Cluster names used when creating remote secrets
east_cluster: cluster-east
west_cluster: cluster-west

# Network names used in the Istio control-plane overlay
east_network: network1
west_network: network2

# Shared mesh ID (identical on both clusters)
mesh_id: mesh1

# Istio version for istioctl download
istio_version: "1.27.5"

# Repository root is set in site.yml (play vars); playbook_dir is unset/wrong while vars_files are templated.

# Set to true to run the multi-cluster tasks in playbook, false to run the single-cluster tasks
multi_cluster: false

# Set to true to enable RHCL deployment, false to skip
rhcl_enabled: false

# Set to true to deploy LLM access with RHCL, false to omit (rhcl_enabled must be set to true as well)
rhcl_secure_llm: false

# Set to true to enable minimal Istio deployment for RHCL, false to use full Istio control plane
rhcl_minimal_istio: false

# Set to true if you want to automate the DNS setup for the RHCL Gateway, otherwise manual setup of hosted zone records is required in Route 53
rhcl_dns_automation: false