---
# Multi-Mesh Demo – Full Deployment
#
# Usage:
#   ansible-playbook site.yml                     # run all steps
#   ansible-playbook site.yml --tags step5        # run a single step
#   ansible-playbook site.yml --skip-tags step2   # skip istioctl install (Dev Spaces)
#
# Available tags: preflight step1 step2 step3…step17 (no separate “verify” step; see preflight)
#   preflight = API checks for contexts that already exist in kubeconfig
#   step1 = require admin-east / admin-west in kubeconfig (README §1.1–1.2) + optional console banners

- name: Multi-Mesh Demo – Full Deployment
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars/main.yml
  vars:
    # playbook_dir is unset/wrong while vars_files are templated; paths must use play vars.
    repo_root: "{{ (playbook_dir ~ '/../..') | realpath }}"
    # Skip API preflight when the run is limited to step1 only (no explicit preflight tag).
    skip_preflight_step1_family: >-
      {{
        ('preflight' not in (ansible_run_tags | default([])))
        and ((ansible_run_tags | default([])) | length > 0)
        and (((ansible_run_tags | default([])) | difference(['step1'])) | length == 0)
      }}

  pre_tasks:
    # Skip kubeconfig-only / console-banner-only runs (no API checks) unless --tags preflight.
    # If a named context is missing, skip that cluster’s API check (step 1 will fail fast with README pointers).
    - name: Preflight | East block (probe context + API when present)
      tags: [always, preflight]
      when: not (skip_preflight_step1_family | bool)
      block:
        - name: Preflight | Probe east context presence
          ansible.builtin.command: oc config get-contexts {{ ctx_east }}
          register: preflight_probe_east
          failed_when: false
          changed_when: false

        - name: Preflight | OpenShift API reachability (east)
          ansible.builtin.import_tasks: ../includes/preflight_oc_api.yml
          vars:
            preflight_oc_context: "{{ ctx_east }}"
          when: preflight_probe_east.rc == 0

    - name: Preflight | West block (probe context + API when present)
      tags: [always, preflight]
      when: not (skip_preflight_step1_family | bool)
      block:
        - name: Preflight | Probe west context presence
          ansible.builtin.command: oc config get-contexts {{ ctx_west }}
          register: preflight_probe_west
          failed_when: false
          changed_when: false

        - name: Preflight | OpenShift API reachability (west)
          ansible.builtin.import_tasks: ../includes/preflight_oc_api.yml
          vars:
            preflight_oc_context: "{{ ctx_west }}"
          when: preflight_probe_west.rc == 0

  tasks:
    - name: "Step 1 | Verify kubeconfig contexts (east/west) and optional console banners"
      ansible.builtin.import_tasks: tasks/01_check_contexts.yml
      tags: [step1]

    - name: "Step 2 | Install istioctl (skip with --skip-tags step2 for Dev Spaces)"
      ansible.builtin.import_tasks: tasks/02_install_istioctl.yml
      when: multi_cluster | bool
      tags: [step2]

    - name: "Step 3 | Install operators on both clusters"
      ansible.builtin.import_tasks: tasks/03_install_operators.yml
      tags: [step3]

    - name: "Step 4 | User workload monitoring"
      ansible.builtin.import_tasks: tasks/04_user_workload_monitoring.yml
      tags: [step4]

    - name: "Step 5 | Create shared root CA"
      ansible.builtin.import_tasks: tasks/05_root_ca.yml
      when: multi_cluster | bool
      tags: [step5]

    - name: "Step 6 | Install tracing system"
      ansible.builtin.import_tasks: tasks/06_tracing_system.yml
      tags: [step6]

    - name: "Step 7 | Install Istio resources"
      ansible.builtin.import_tasks: tasks/07_istio_resources.yml
      tags: [step7]

    - name: "Step 8 | Kiali deployment"
      ansible.builtin.import_tasks: tasks/08_kiali.yml
      tags: [step8]

    - name: "Step 9 | Bookinfo app"
      ansible.builtin.import_tasks: tasks/09_bookinfo.yml
      tags: [step9]

    - name: "Step 10 | RHCL / Connectivity Link operators"
      ansible.builtin.import_tasks: tasks/10_rhcl_install_operators.yml
      when: rhcl_enabled | bool
      tags: [step10]

    - name: "Step 11 | Kuadrant system (namespace + Kuadrant CR)"
      ansible.builtin.import_tasks: tasks/11_rhcl_deploy_kuadrant_system.yml
      when: rhcl_enabled | bool
      tags: [step11]

    - name: "Step 12 | RHCL TLS — Route53 secrets + ClusterIssuer (letsencrypt)"
      ansible.builtin.import_tasks: tasks/12_rhcl_tls_dns_setup.yml
      when: rhcl_enabled | bool
      tags: [step12]

    - name: "Step 13 | Kuadrant-enabled Gateway (apply + status checks)"
      ansible.builtin.import_tasks: tasks/13_rhcl_enabled_gw.yml
      when: rhcl_enabled | bool
      tags: [step13]

    - name: "Step 14 | RHCL TLSPolicy (prod-gateway TLS)"
      ansible.builtin.import_tasks: tasks/14_rhcl_apply_tls_policy.yml
      when: rhcl_enabled | bool
      tags: [step14]

    - name: "Step 15 | RHCL DNSPolicy (prod-gateway DNS)"
      ansible.builtin.import_tasks: tasks/15_rhcl_apply_dns_policy.yml
      when: rhcl_enabled | bool
      tags: [step15]

    - name: "Step 16 | Bookinfo HTTPRoute for RHCL gateway"
      ansible.builtin.import_tasks: tasks/16_rhcl_update_bookinfo_httproute.yml
      when: rhcl_enabled | bool
      tags: [step16]

    - name: "Step 17 | Secure LLM proxy (Istio federation + Kuadrant secret/HTTPRoute/AuthPolicy)"
      ansible.builtin.import_tasks: tasks/17_rhcl_secure_llm_proxy.yaml
      when: rhcl_enabled | bool and rhcl_secure_llm | bool
      tags: [step17]
