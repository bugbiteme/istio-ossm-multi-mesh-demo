---
# Step 11: Kuadrant system namespace + CR (rhcl/manifests/kuadrant-system)

- name: "[11.0] Discover Kuadrant system manifest files"
  ansible.builtin.find:
    paths: "{{ repo_root }}/rhcl/manifests/kuadrant-system"
    patterns: "*.yaml,*.yml"
    file_type: file
  register: kuadrant_system_manifests
  changed_when: false
  tags: [step11]

- name: "[11.0] Require at least one manifest under rhcl/manifests/kuadrant-system"
  ansible.builtin.assert:
    that:
      - kuadrant_system_manifests.files | length > 0
    fail_msg: >-
      rhcl_enabled is true but no *.yaml/*.yml files were found under
      {{ repo_root }}/rhcl/manifests/kuadrant-system
  tags: [step11]

- name: "[11.1] Apply Kuadrant system manifests (east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    definition: "{{ lookup('file', item.path) | from_yaml_all | list }}"
    state: present
    apply: true
  loop: "{{ kuadrant_system_manifests.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  tags: [step11]

# - name: "[11.1] Apply Kuadrant system manifests (west)"
#   kubernetes.core.k8s:
