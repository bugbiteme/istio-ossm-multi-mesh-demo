# Rollouts first (same idea as tracing-system); then confirm every pod is Running with all containers ready.
- name: "[11.2] Wait for kuadrant-system rollouts (east)"
  ansible.builtin.shell: |
    set -euo pipefail
    ctx="{{ ctx_east }}"
    ns=kuadrant-system
    for kind in deploy sts ds; do
      oc --context="$ctx" get "$kind" -n "$ns" -o name 2>/dev/null | while read -r res; do
        oc --context="$ctx" rollout status "$res" -n "$ns" --timeout=600s
      done
    done
  args:
    executable: /bin/bash
  changed_when: false
  tags: [step11]

