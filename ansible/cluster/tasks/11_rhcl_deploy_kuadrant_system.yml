- name: "[11.3] Wait for all kuadrant-system pods Running and ready (east)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: v1
    kind: Pod
    namespace: kuadrant-system
  register: kuadrant_pods_east
  until: >
    (kuadrant_pods_east.resources | default([]) | length > 0) and
    (
      kuadrant_pods_east.resources
      | rejectattr('metadata.deletionTimestamp', 'defined')
      | map(attribute='status.phase', default='')
      | list | unique == ['Running']
    ) and
    (
      (
        kuadrant_pods_east.resources
        | rejectattr('metadata.deletionTimestamp', 'defined')
        | map(attribute='status.containerStatuses', default=[])
        | flatten
        | selectattr('ready', 'defined')
        | selectattr('ready', 'equalto', true)
        | list
        | length
      )
      ==
      (
        kuadrant_pods_east.resources
        | rejectattr('metadata.deletionTimestamp', 'defined')
        | map(attribute='status.containerStatuses', default=[])
        | flatten
        | list
        | length
      )
    ) and
    (
      kuadrant_pods_east.resources
      | rejectattr('metadata.deletionTimestamp', 'defined')
      | map(attribute='status.containerStatuses', default=[])
      | flatten
      | list
      | length
    ) > 0
  retries: 60
  delay: 15
  failed_when: >
    (kuadrant_pods_east.resources | default([])
    | selectattr('status.phase', 'defined')
    | selectattr('status.phase', 'equalto', 'Failed')
    | list | length) > 0
  tags: [step11]

- name: "[11.3] Wait for all kuadrant-system pods Running and ready (west)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_west }}"
    api_version: v1
    kind: Pod
    namespace: kuadrant-system
  register: kuadrant_pods_west
  until: >
    (kuadrant_pods_west.resources | default([]) | length > 0) and
    (
      kuadrant_pods_west.resources
      | rejectattr('metadata.deletionTimestamp', 'defined')
      | map(attribute='status.phase', default='')
      | list | unique == ['Running']
    ) and
    (
      (
        kuadrant_pods_west.resources
        | rejectattr('metadata.deletionTimestamp', 'defined')
        | map(attribute='status.containerStatuses', default=[])
        | flatten
        | selectattr('ready', 'defined')
        | selectattr('ready', 'equalto', true)
        | list
        | length
      )
      ==
      (
        kuadrant_pods_west.resources
        | rejectattr('metadata.deletionTimestamp', 'defined')
        | map(attribute='status.containerStatuses', default=[])
        | flatten
        | list
        | length
      )
    ) and
    (
      kuadrant_pods_west.resources
      | rejectattr('metadata.deletionTimestamp', 'defined')
      | map(attribute='status.containerStatuses', default=[])
      | flatten
      | list
      | length
    ) > 0
  retries: 60
  delay: 15
  failed_when: >
    (kuadrant_pods_west.resources | default([])
    | selectattr('status.phase', 'defined')
    | selectattr('status.phase', 'equalto', 'Failed')
    | list | length) > 0
  when: multi_cluster | bool
  tags: [step11]
