---
# Step 18: RHCL LLM playground (requires OpenShift GitOps default Argo CD instance)

- name: "[18.1] Wait for default Argo CD instance Reconciled=True (east)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: argoproj.io/v1beta1
    kind: ArgoCD
    name: openshift-gitops
    namespace: openshift-gitops
  register: argocd_openshift_gitops_east
  until: >
    argocd_openshift_gitops_east.resources | length > 0 and
    (
      argocd_openshift_gitops_east.resources[0].status.conditions | default([]) |
      selectattr('type', 'equalto', 'Reconciled') |
      map(attribute='status') |
      first |
      default('')
    ) == 'True'
  retries: 60
  delay: 15
  failed_when: >
    argocd_openshift_gitops_east.resources | length > 0 and
    (
      argocd_openshift_gitops_east.resources[0].status.conditions | default([]) |
      selectattr('type', 'equalto', 'Reconciled') |
      map(attribute='status') |
      first |
      default('')
    ) == 'False'
  tags: [step18]

# Fetch upstream YAML to a file, then k8s src= (avoids lookup('url')|from_yaml in k8s definition, which
# can spike memory and get the controller Python killed on macOS: "Python quit unexpectedly" / dead worker).
# Block name matches the former single task so --start-at-task still runs download+apply.
- name: "[18.2] Apply Argo CD Application (llm-playground from upstream manifest)"
  block:
  - name: "Download gitops/application.yaml to controller /tmp"
    ansible.builtin.get_url:
      url: https://raw.githubusercontent.com/bugbiteme/llm-playground-manifests/refs/heads/main/gitops/application.yaml
      dest: /tmp/llm-playground-ansible-step18-app.yaml
      mode: "0600"
      force: true
  - name: "Apply to east cluster (kubernetes.core.k8s)"
    kubernetes.core.k8s:
      context: "{{ ctx_east }}"
      src: /tmp/llm-playground-ansible-step18-app.yaml
      state: present
      apply: true
  tags: [step18]

- name: "[18.3] Wait for Argo CD Application sync status Synced (east)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: llm-playground
    namespace: openshift-gitops
  register: argocd_llm_playground_app_east
  until: >
    argocd_llm_playground_app_east.resources | length > 0 and
    (
      argocd_llm_playground_app_east.resources[0].status.sync.status | default('')
    ) == 'Synced'
  retries: 60
  delay: 15
  tags: [step18]

- name: "[18.4] Apply PipelineRun (llm-policy-monitor) from upstream manifest"
  block:
  - name: "Download pipelinerun-llm-pol-mon.yaml to controller /tmp"
    ansible.builtin.get_url:
      url: https://raw.githubusercontent.com/bugbiteme/llm-playground-manifests/refs/heads/main/k8s/pipelinerun-llm-pol-mon.yaml
      dest: /tmp/llm-playground-ansible-step18-pipelinerun-pol-mon.yaml
      mode: "0600"
      force: true
  # Upstream uses metadata.generateName only (no name). apply: true (SSA) requires a name; use create/merge.
  - name: "Apply llm-policy-monitor PipelineRun to east cluster"
    kubernetes.core.k8s:
      context: "{{ ctx_east }}"
      src: /tmp/llm-playground-ansible-step18-pipelinerun-pol-mon.yaml
      state: present
      apply: false
  tags: [step18]

- name: "[18.5] Apply PipelineRun (llm-playground) from upstream manifest"
  block:
  - name: "Download pipelinerun-llm-playground.yaml to controller /tmp"
    ansible.builtin.get_url:
      url: https://raw.githubusercontent.com/bugbiteme/llm-playground-manifests/refs/heads/main/k8s/pipelinerun-llm-playground.yaml
      dest: /tmp/llm-playground-ansible-step18-pipelinerun-playground.yaml
      mode: "0600"
      force: true
  - name: "Apply llm-playground PipelineRun to east cluster"
    kubernetes.core.k8s:
      context: "{{ ctx_east }}"
      src: /tmp/llm-playground-ansible-step18-pipelinerun-playground.yaml
      state: present
      apply: true
  tags: [step18]

- name: "[18.6] Wait for Argo CD Application health Healthy (east, 600s)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: llm-playground
    namespace: openshift-gitops
  register: argocd_llm_playground_health_east
  until: >
    argocd_llm_playground_health_east.resources | length > 0 and
    (
      argocd_llm_playground_health_east.resources[0].status.health.status | default('')
    ) == 'Healthy'
  retries: 120
  delay: 5
  failed_when: >
    argocd_llm_playground_health_east.resources | length > 0 and
    (
      argocd_llm_playground_health_east.resources[0].status.health.status | default('')
    ) == 'Degraded'
  tags: [step18]
