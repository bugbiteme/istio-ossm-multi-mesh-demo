---
# Step 13: Kuadrant-enabled Gateway (rhcl/README.md §5 steps 5–7)
# Gateway name/namespace default to prod-gateway / ingress-gateway; override with
# KUADRANT_GATEWAY_NAME and KUADRANT_GATEWAY_NS when checking listener status.

- name: "[13.1] Apply Kuadrant Gateway manifests (east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    definition: "{{ lookup('file', repo_root ~ '/manifests/ingress-gateway/rhcl/gateway.yaml') | from_yaml_all | list }}"
    state: present
    apply: true
  tags: [step13]

# - name: "[13.1] Apply Kuadrant Gateway manifests (west)"
#   kubernetes.core.k8s:
#     context: "{{ ctx_west }}"
#     definition: "{{ lookup('file', repo_root ~ '/manifests/ingress-gateway/rhcl/gateway.yaml') | from_yaml_all | list }}"
#     state: present
#     apply: true
#   when: multi_cluster | bool
#   tags: [step13]

- name: "[13.2] Wait for Gateway Accepted and Programmed (east)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: gateway.networking.k8s.io/v1
    kind: Gateway
    name: prod-gateway
    namespace: ingress-gateway
  register: rhcl_gw_east
  until: >
    rhcl_gw_east.resources | length > 0 and
    (
      rhcl_gw_east.resources[0].status.conditions | default([])
      | selectattr('type', 'equalto', 'Accepted')
      | map(attribute='status')
      | first | default('')
      == 'True'
    ) and
    (
      rhcl_gw_east.resources[0].status.conditions | default([])
      | selectattr('type', 'equalto', 'Programmed')
      | map(attribute='status')
      | first | default('')
      == 'True'
    )
  retries: 60
  delay: 10
  failed_when: >
    rhcl_gw_east.resources | length > 0 and
    (
      (
        rhcl_gw_east.resources[0].status.conditions | default([])
        | selectattr('type', 'equalto', 'Accepted')
        | map(attribute='status')
        | first | default('')
      ) == 'False'
    )
  tags: [step13]

