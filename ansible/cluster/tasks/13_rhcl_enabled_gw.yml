# README §5.7 — HTTPS listener may show Bad TLS until TLSPolicy + cert-manager populate the secret
- name: "[13.4] HTTPS listener Programmed message (east)"
  vars:
    rhcl_gw_name: "{{ lookup('env', 'KUADRANT_GATEWAY_NAME') | default('prod-gateway', true) }}"
    rhcl_gw_ns: "{{ lookup('env', 'KUADRANT_GATEWAY_NS') | default('ingress-gateway', true) }}"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: gateway.networking.k8s.io/v1
    kind: Gateway
    name: "{{ rhcl_gw_name }}"
    namespace: "{{ rhcl_gw_ns }}"
  register: rhcl_gw_listener_east
  tags: [step13]

- name: "[13.4] Note listener TLS status (east)"
  ansible.builtin.debug:
    msg:
      listener_programmed_message: >-
        {{
          (
            (
              (
                (rhcl_gw_listener_east.resources[0].status | default({})).listeners | default([])
                | first
              ).conditions | default([])
              | selectattr('type', 'equalto', 'Programmed')
              | map(attribute='message') | first | default('(none)')
            )
            if (
              (rhcl_gw_listener_east.resources[0].status | default({})).listeners | default([])
              | length
            ) > 0
            else '(no listeners in Gateway status yet)'
          )
        }}
      note: >-
        If this mentions bad TLS configuration, that is expected until you apply
        the TLSPolicy; cert-manager creates api-prod-gateway-tls after that.
  tags: [step13]

