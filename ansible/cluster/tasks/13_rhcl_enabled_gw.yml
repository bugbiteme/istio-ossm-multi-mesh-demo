# README §5.6 — Accepted / Programmed messages (cluster Gateway status)
- name: "[13.3] Gateway Accepted / Programmed messages (east)"
  ansible.builtin.debug:
    msg:
      accepted: >-
        {{ rhcl_gw_east.resources[0].status.conditions | default([])
        | selectattr('type', 'equalto', 'Accepted')
        | map(attribute='message') | first | default('(none)') }}
      programmed: >-
        {{ rhcl_gw_east.resources[0].status.conditions | default([])
        | selectattr('type', 'equalto', 'Programmed')
        | map(attribute='message') | first | default('(none)') }}
  tags: [step13]

