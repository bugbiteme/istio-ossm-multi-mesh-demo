---
# Step 7: Install all Istio resources
# Sub-sections: 7.1 CNI | 7.2 Control plane | 7.3 East-west gateways |
#               7.4 Expose services | 7.5 Cross-cluster discovery | 7.6 Ingress gateway

# --- 7.1 Istio CNI ---

- name: "[7.1] Apply Istio CNI kustomization (east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    definition: "{{ lookup('kubernetes.core.kustomize', dir=repo_root ~ '/manifests/ossm/istio-cni') }}"
    state: present
    apply: true
  tags: [step7]

- name: "[7.1] Apply Istio CNI kustomization (west)"
  kubernetes.core.k8s:
    context: "{{ ctx_west }}"
    definition: "{{ lookup('kubernetes.core.kustomize', dir=repo_root ~ '/manifests/ossm/istio-cni') }}"
    state: present
    apply: true
  when: multi_cluster | bool
  tags: [step7]

- name: "[7.1] Wait for istio-cni-node daemonset rollout (east)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: apps/v1
    kind: DaemonSet
    name: istio-cni-node
    namespace: istio-cni
  register: east_cni_ds
  until: >
    east_cni_ds.resources | length > 0 and
    (east_cni_ds.resources[0].status.desiredNumberScheduled | default(0) | int) > 0 and
    (east_cni_ds.resources[0].status.numberReady | default(0) | int) >=
    (east_cni_ds.resources[0].status.desiredNumberScheduled | default(0) | int)
  retries: 60
  delay: 5
  tags: [step7]

- name: "[7.1] Wait for istio-cni-node daemonset rollout (west)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_west }}"
    api_version: apps/v1
    kind: DaemonSet
    name: istio-cni-node
    namespace: istio-cni
  register: west_cni_ds
  until: >
    west_cni_ds.resources | length > 0 and
    (west_cni_ds.resources[0].status.desiredNumberScheduled | default(0) | int) > 0 and
    (west_cni_ds.resources[0].status.numberReady | default(0) | int) >=
    (west_cni_ds.resources[0].status.desiredNumberScheduled | default(0) | int)
  retries: 60
  delay: 5
  when: multi_cluster | bool
  tags: [step7]

# --- 7.2 Istio control plane ---

- name: "[7.2] Apply Istio control plane overlay (east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    definition: "{{ lookup('kubernetes.core.kustomize', dir=repo_root ~ '/manifests/ossm/istio-system/overlays/east') }}"
    state: present
    apply: true
  tags: [step7]

- name: "[7.2] Apply Istio control plane overlay (west)"
  kubernetes.core.k8s:
    context: "{{ ctx_west }}"
    definition: "{{ lookup('kubernetes.core.kustomize', dir=repo_root ~ '/manifests/ossm/istio-system/overlays/west') }}"
    state: present
    apply: true
  when: multi_cluster | bool
  tags: [step7]

- name: "[7.2] Wait for Istio control plane to be ready (east)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: sailoperator.io/v1
    kind: Istio
    name: default
    namespace: istio-system
  register: east_istio_cr
  until: >
    east_istio_cr.resources | length > 0 and
    (
      east_istio_cr.resources[0].status.conditions | default([]) |
      selectattr('type', 'equalto', 'Ready') | map(attribute='status') | first | default('')
    ) == 'True'
  retries: 60
  delay: 5
  tags: [step7]

- name: "[7.2] Wait for Istio control plane to be ready (west)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_west }}"
    api_version: sailoperator.io/v1
    kind: Istio
    name: default
    namespace: istio-system
  register: west_istio_cr
  until: >
    west_istio_cr.resources | length > 0 and
    (
      west_istio_cr.resources[0].status.conditions | default([]) |
      selectattr('type', 'equalto', 'Ready') | map(attribute='status') | first | default('')
    ) == 'True'
  retries: 60
  delay: 5
  when: multi_cluster | bool
  tags: [step7]

- name: "[7.2] Verify istio-ca-root-cert ConfigMap exists (east)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: v1
    kind: ConfigMap
    name: istio-ca-root-cert
    namespace: istio-system
  when: multi_cluster | bool
  register: east_ca_cm
  failed_when: east_ca_cm.resources | length == 0
  tags: [step7]

- name: "[7.2] Verify istio-ca-root-cert ConfigMap exists (west)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_west }}"
    api_version: v1
    kind: ConfigMap
    name: istio-ca-root-cert
    namespace: istio-system
  when: multi_cluster | bool
  register: west_ca_cm
  failed_when: west_ca_cm.resources | length == 0
  tags: [step7]

# --- 7.3 East-west gateways ---

- name: "[7.3] Deploy east-west gateway (east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    src: "{{ repo_root }}/manifests/ossm/eastwest-gateway/east/eastwest-gateway.yaml"
    state: present
    apply: true
  when: multi_cluster | bool
  tags: [step7]

- name: "[7.3] Deploy east-west gateway (west)"
  kubernetes.core.k8s:
    context: "{{ ctx_west }}"
    src: "{{ repo_root }}/manifests/ossm/eastwest-gateway/west/eastwest-gateway.yaml"
    state: present
    apply: true
  when: multi_cluster | bool
  tags: [step7]

- name: "[7.3] Wait for east-west gateway rollout (east)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: apps/v1
    kind: Deployment
    name: istio-eastwestgateway
    namespace: istio-system
  when: multi_cluster | bool
  register: east_ew_dep
  until: >
    east_ew_dep.resources | length > 0 and
    (east_ew_dep.resources[0].status.replicas | default(0) | int) > 0 and
    (east_ew_dep.resources[0].status.readyReplicas | default(0) | int) >=
    (east_ew_dep.resources[0].status.replicas | default(0) | int)
  retries: 24
  delay: 5
  tags: [step7]

- name: "[7.3] Wait for east-west gateway rollout (west)"
  kubernetes.core.k8s_info:
    context: "{{ ctx_west }}"
    api_version: apps/v1
    kind: Deployment
    name: istio-eastwestgateway
    namespace: istio-system
  when: multi_cluster | bool
  register: west_ew_dep
  until: >
    west_ew_dep.resources | length > 0 and
    (west_ew_dep.resources[0].status.replicas | default(0) | int) > 0 and
    (west_ew_dep.resources[0].status.readyReplicas | default(0) | int) >=
    (west_ew_dep.resources[0].status.replicas | default(0) | int)
  retries: 24
  delay: 5
  tags: [step7]

- name: "[7.3] Collect east gateway external address"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: v1
    kind: Service
    name: istio-eastwestgateway
    namespace: istio-system
  when: multi_cluster | bool
  register: east_ew_svc
  until: >
    east_ew_svc.resources | length > 0 and
    (east_ew_svc.resources[0].status.loadBalancer.ingress | default([]) | length) > 0
  retries: 20
  delay: 15
  tags: [step7]

- name: "[7.3] Collect west gateway external address"
  kubernetes.core.k8s_info:
    context: "{{ ctx_west }}"
    api_version: v1
    kind: Service
    name: istio-eastwestgateway
    namespace: istio-system
  when: multi_cluster | bool
  register: west_ew_svc
  until: >
    west_ew_svc.resources | length > 0 and
    (west_ew_svc.resources[0].status.loadBalancer.ingress | default([]) | length) > 0
  retries: 20
  delay: 15
  tags: [step7]

- name: "[7.3] Set gateway address facts"
  ansible.builtin.set_fact:
    east_gw_addr: >-
      {{ (east_ew_svc.resources[0].status.loadBalancer.ingress[0].ip | default('', true))
      ~ (east_ew_svc.resources[0].status.loadBalancer.ingress[0].hostname | default('', true)) }}
    west_gw_addr: >-
      {{ (west_ew_svc.resources[0].status.loadBalancer.ingress[0].ip | default('', true))
      ~ (west_ew_svc.resources[0].status.loadBalancer.ingress[0].hostname | default('', true)) }}
  when: multi_cluster | bool
  tags: [step7]

- name: "[7.3] Show gateway addresses"
  ansible.builtin.debug:
    msg:
      - "East gateway: {{ east_gw_addr }}"
      - "West gateway: {{ west_gw_addr }}"
  when: multi_cluster | bool
  tags: [step7]

# --- 7.4 Expose services through east-west gateways ---

- name: "[7.4] Apply cross-network-gateway resources (east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    src: "{{ repo_root }}/manifests/ossm/eastwest-gateway/common/cross-network-gateway.yaml"
    state: present
    apply: true
  when: multi_cluster | bool
  tags: [step7]

- name: "[7.4] Apply cross-network-gateway resources (west)"
  kubernetes.core.k8s:
    context: "{{ ctx_west }}"
    src: "{{ repo_root }}/manifests/ossm/eastwest-gateway/common/cross-network-gateway.yaml"
    state: present
    apply: true
  when: multi_cluster | bool
  tags: [step7]

# --- 7.5 Cross-cluster endpoint discovery ---

- name: "[7.5] Create remote secret for west cluster and apply to east"
  ansible.builtin.shell: |
    set -o pipefail
    istioctl create-remote-secret \
      --context="{{ ctx_west }}" \
      --name="{{ west_cluster }}" \
      --namespace=istio-system | \
      oc --context="{{ ctx_east }}" apply -n istio-system -f -
  args:
    executable: /bin/bash
  changed_when: true
  when: multi_cluster | bool
  tags: [step7]

- name: "[7.5] Create remote secret for east cluster and apply to west"
  ansible.builtin.shell: |
    set -o pipefail
    istioctl create-remote-secret \
      --context="{{ ctx_east }}" \
      --name="{{ east_cluster }}" \
      --namespace=istio-system | \
      oc --context="{{ ctx_west }}" apply -n istio-system -f -
  args:
    executable: /bin/bash
  changed_when: true
  when: multi_cluster | bool
  tags: [step7]

- name: "[7.5] Verify remote cluster status (east sees west)"
  ansible.builtin.command: "istioctl --context={{ ctx_east }} remote-clusters"
  register: east_remote_clusters
  changed_when: false
  when: multi_cluster | bool
  tags: [step7]

- name: "[7.5] Verify remote cluster status (west sees east)"
  ansible.builtin.command: "istioctl --context={{ ctx_west }} remote-clusters"
  register: west_remote_clusters
  changed_when: false
  when: multi_cluster | bool
  tags: [step7]

- name: "[7.5] Show remote cluster sync status"
  ansible.builtin.debug:
    msg:
      - "East remote clusters: {{ east_remote_clusters.stdout_lines }}"
      - "West remote clusters: {{ west_remote_clusters.stdout_lines }}"
  when: multi_cluster | bool
  tags: [step7]

- name: "[7.5] Assert both clusters show synced status"
  ansible.builtin.assert:
    that:
      - "'synced' in east_remote_clusters.stdout"
      - "'synced' in west_remote_clusters.stdout"
    fail_msg: "One or both clusters are not synced. Check remote secret configuration."
    success_msg: "Both clusters are synced."
  when: multi_cluster | bool
  tags: [step7]

# --- 7.6 Ingress gateway ---

- name: "[7.6] Deploy ingress gateway (east)"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    src: "{{ repo_root }}/manifests/ingress-gateway/gateway.yaml"
    state: present
    apply: true
  tags: [step7]

- name: "[7.6] Wait for prod-gateway to be programmed"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: gateway.networking.k8s.io/v1
    kind: Gateway
    name: prod-gateway
    namespace: ingress-gateway
  register: prod_gw
  until: >
    prod_gw.resources | length > 0 and
    (
      prod_gw.resources[0].status.conditions | default([]) |
      selectattr('type', 'equalto', 'Programmed') | map(attribute='status') | first | default('')
    ) == 'True'
  retries: 20
  delay: 15
  tags: [step7]

- name: "[7.6] Show ingress gateway details"
  ansible.builtin.debug:
    msg: "{{ prod_gw.resources[0] | to_json }}"
  tags: [step7]

- name: "[7.6] Apply ingress gateway telemetry"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    src: "{{ repo_root }}/manifests/ingress-gateway/telemetry.yaml"
    state: present
    apply: true
  tags: [step7]