---
# Step 7: Install all Istio resources
# Sub-sections: 7.1 CNI | 7.2 Control plane | 7.3 Ingress gateway

# --- 7.1 Istio CNI ---

- name: "[7.1] Apply Istio CNI kustomization"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}" apply -k {{ repo_root }}/manifests/ossm/istio-cni/
  changed_when: true
  tags: [step7]

- name: "[7.1] Wait for istio-cni-node daemonset rollout"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}" rollout status daemonset istio-cni-node -n istio-cni
  changed_when: false
  tags: [step7]

# --- 7.2 Istio control plane ---

- name: "[7.2] Apply Istio control plane overlay (east)"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}"
    apply -k {{ repo_root }}/manifests/ossm/istio-system/overlays/east
  changed_when: true
  tags: [step7]

- name: "[7.2] Wait for Istio control plane to be ready"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}" wait --for=condition=Ready
    istio/default -n istio-system --timeout=300s
  changed_when: false
  tags: [step7]

- name: "[7.2] Verify istio-ca-root-cert ConfigMap exists"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}" get configmap istio-ca-root-cert -n istio-system
  changed_when: false
  register: ca_cm
  tags: [step7]

- name: "[7.2] Fail if istio-ca-root-cert is missing"
  ansible.builtin.fail:
    msg: "istio-ca-root-cert ConfigMap is missing. Check that the cacerts secret was applied correctly."
  when: ca_cm.rc != 0
  tags: [step7]

# --- 7.3 Ingress gateway ---

- name: "[7.3] Deploy ingress gateway"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}"
    apply -f {{ repo_root }}/manifests/ingress-gateway/
  changed_when: true
  tags: [step7]

- name: "[7.3] Wait for prod-gateway to be programmed"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}" get gtw prod-gateway -n ingress-gateway
    -o jsonpath='{.status.conditions[?(@.type=="Programmed")].status}'
  register: gw_programmed
  until: gw_programmed.stdout == "True"
  retries: 20
  delay: 15
  changed_when: false
  tags: [step7]

- name: "[7.3] Show ingress gateway details"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}" get gtw prod-gateway -n ingress-gateway
  changed_when: false
  tags: [step7]
