---
# Step 6: Install the tracing system (MinIO + Tempo stack)

- name: "[6] Wait for Tempo operator controller to be ready before applying TempoStack"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: v1
    kind: Endpoints
    name: tempo-operator-controller-service
    namespace: openshift-operators
  register: tempo_ep
  until: >
    tempo_ep.resources | length > 0 and
    (tempo_ep.resources[0].subsets | default([]) | length > 0) and
    (tempo_ep.resources[0].subsets[0].addresses | default([]) | length > 0)
  retries: 30
  delay: 10
  tags: [step6]

- name: "[6] Apply tracing-system kustomization"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    definition: "{{ lookup('kubernetes.core.kustomize', dir=repo_root ~ '/manifests/tracing-system') }}"
    state: present
    apply: true
  tags: [step6]

- name: "[6.1] Wait for all pods Ready in tracing-system"
  ansible.builtin.command: >
    oc --context="{{ ctx_east }}"
    wait --for=condition=Ready pod --all -n tracing-system --timeout=600s
  changed_when: false
  tags: [step6]
