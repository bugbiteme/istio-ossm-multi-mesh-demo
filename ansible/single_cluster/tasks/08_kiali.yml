---
# Step 8: Kiali deployment

- name: "[8] Read Tempo signing CA certificate from cluster"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: v1
    kind: Secret
    name: tempo-sample-signing-ca
    namespace: tracing-system
  register: tempo_ca_secret
  failed_when: tempo_ca_secret.resources | length == 0
  tags: [step8]

- name: "[8] Write Tempo signing CA to local file for Kiali"
  ansible.builtin.copy:
    dest: "{{ repo_root }}/certs/ca.crt"
    content: "{{ tempo_ca_secret.resources[0].data['tls.crt'] | b64decode }}"
    mode: "0600"
  tags: [step8]

- name: "[8] Create cacert secret in istio-system"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: cacert
        namespace: istio-system
      type: Opaque
      stringData:
        ca.crt: "{{ lookup('ansible.builtin.file', repo_root ~ '/certs/ca.crt') }}"
    state: present
    apply: true
  tags: [step8]

- name: "[8] Apply Kiali manifests"
  kubernetes.core.k8s:
    context: "{{ ctx_east }}"
    src: "{{ item }}"
    state: present
    apply: true
  loop:
    - "{{ repo_root }}/manifests/ossm/kiali/kiali-monitoring-rbac.yaml"
    - "{{ repo_root }}/manifests/ossm/kiali/kiali-ossmc.yaml"
    - "{{ repo_root }}/manifests/ossm/kiali/kiali.yaml"
  tags: [step8]

- name: "[8] Wait for Kiali deployment to be ready"
  kubernetes.core.k8s_info:
    context: "{{ ctx_east }}"
    api_version: apps/v1
    kind: Deployment
    name: kiali
    namespace: istio-system
  register: kiali_dep
  until: >
    kiali_dep.resources | length > 0 and
    (kiali_dep.resources[0].status.replicas | default(0) | int) > 0 and
    (kiali_dep.resources[0].status.readyReplicas | default(0) | int) >=
    (kiali_dep.resources[0].status.replicas | default(0) | int)
  retries: 60
  delay: 5
  tags: [step8]
