# OPTIONAL: Locality-based failover for East.
# Apply only if hotels/insurances replicas exist on East as failover targets.
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: hotels-multicluster
  namespace: travel-agency
spec:
  exportTo: ["."]
  host: hotels.travel-agency.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
    localityLbSetting:
      enabled: true
      failover:
        - from: east-region
          to: west-region
  subsets:
    - name: west
      labels:
        topology.istio.io/cluster: cluster-west
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: hotels
  namespace: travel-agency
spec:
  exportTo: ["."]
  hosts:
    - hotels.travel-agency.svc.cluster.local
  http:
    - route:
        - destination:
            host: hotels.travel-agency.svc.cluster.local
            subset: west
          weight: 100
