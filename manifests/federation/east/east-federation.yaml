# East federation config — all travel-agency services are private (no cross-cluster export).
# PeerAuthentication enforces STRICT mTLS for the namespace so that the DestinationRule
# ISTIO_MUTUAL mode is honoured by both the client and server sidecars.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: travel-agency-mtls
  namespace: travel-agency
spec:
  mtls:
    mode: STRICT
---
# Port-level mTLS exception for MySQL — portLevelMtls requires a workload selector.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: mysqldb-mtls-exception
  namespace: travel-agency
spec:
  selector:
    matchLabels:
      app: mysqldb
  mtls:
    mode: STRICT
  portLevelMtls:
    "3306":
      mode: DISABLE
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: travel-agency-local
  namespace: travel-agency
spec:
  exportTo: ["."]
  host: "*.travel-agency.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
# MySQL uses plain TCP — disable mTLS on the client side for port 3306.
# The PeerAuthentication portLevelMtls exception covers the server (inbound) side.
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: mysqldb-local
  namespace: travel-agency
spec:
  exportTo: ["."]
  host: mysqldb.travel-agency.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
