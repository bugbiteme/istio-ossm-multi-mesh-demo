# West federation config — hotels and insurances exported; discounts stays private.
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: travel-agency-mtls
  namespace: travel-agency
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: mysqldb-mtls-exception
  namespace: travel-agency
spec:
  selector:
    matchLabels:
      app: mysqldb
  mtls:
    mode: STRICT
  portLevelMtls:
    "3306":
      mode: DISABLE
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: discounts-private
  namespace: travel-agency
spec:
  exportTo: ["."]
  host: discounts.travel-agency.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: hotels-federated
  namespace: travel-agency
spec:
  exportTo: ["*"]
  host: hotels.travel-agency.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: insurances-federated
  namespace: travel-agency
spec:
  exportTo: ["*"]
  host: insurances.travel-agency.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
