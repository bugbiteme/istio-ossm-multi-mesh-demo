# The 'travels' ServiceAccount must exist on West even though no travels pod runs here.
# West's istiod needs to resolve the SPIFFE principal
# "cluster.local/ns/travel-agency/sa/travels" (presented in East's mTLS cert) when
# evaluating the AuthorizationPolicies in authz-west.yaml. Without this SA the
# principal lookup fails and all cross-cluster calls from travels are denied.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: travels
  namespace: travel-agency
