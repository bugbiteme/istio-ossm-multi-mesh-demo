apiVersion: v1
kind: Namespace
metadata:
  labels:
    istio-discovery: enabled
  
  name: ingress-gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  labels:
    app: ingress-gateway
    kuadrant.io/gateway: "true"
  name: prod-gateway
  namespace: ingress-gateway
spec:
    gatewayClassName: istio
    listeners:
    - allowedRoutes:
        namespaces:
          from: All
      hostname: "api.${KUADRANT_ZONE_ROOT_DOMAIN}"
      name: api
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
        - group: ""
          kind: Secret
          name: api-prod-gateway-tls
        mode: Terminate
