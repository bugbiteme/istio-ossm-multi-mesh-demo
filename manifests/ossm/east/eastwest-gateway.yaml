# East east-west gateway IstioOperator manifest.
# Requires env vars: MESH_ID, EAST_CLUSTER, EAST_NETWORK (use envsubst).
# Applied via: envsubst < manifests/ossm/east/eastwest-gateway.yaml | istioctl install -y -f -
apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
spec:
  profile: empty
  components:
    ingressGateways:
      - name: istio-eastwestgateway
        label:
          istio: eastwestgateway
          app: istio-eastwestgateway
          topology.istio.io/network: ${EAST_NETWORK}
        enabled: true
        k8s:
          env:
            - name: ISTIO_META_ROUTER_MODE
              value: "sni-dnat"
            - name: ISTIO_META_REQUESTED_NETWORK_VIEW
              value: ${EAST_NETWORK}
          service:
            type: LoadBalancer
            ports:
              - name: status-port
                port: 15021
                targetPort: 15021
              - name: tls
                port: 15443
                targetPort: 15443
              - name: tls-istiod
                port: 15012
                targetPort: 15012
              - name: tls-webhook
                port: 15017
                targetPort: 15017
  values:
    global:
      meshID: ${MESH_ID}
      network: ${EAST_NETWORK}
      multiCluster:
        clusterName: ${EAST_CLUSTER}
