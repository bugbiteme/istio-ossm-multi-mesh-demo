apiVersion: v1
kind: ServiceAccount
metadata:
  name: travels-control
  labels:
    account: control
    app: control
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control
spec:
  selector:
    matchLabels:
      app: control
      version: v1
  replicas: 1
  template:
    metadata:
      annotations:
        readiness.status.sidecar.istio.io/applicationPorts: ""
      labels:
        app: control
        version: v1
    spec:
      serviceAccountName: travels-control
      containers:
        - name: control
          image: quay.io/kiali/demo_travels_control:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            privileged: false
            readOnlyRootFilesystem: true
          env:
            - name: PORTAL_SERVICES
              value: "voyages.fr;http://voyages.travel-portal:8000,viaggi.it;http://viaggi.travel-portal:8000,travels.uk;http://travels.travel-portal:8000,viaje.es;http://viaje.travel-portal:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: control
  labels:
    app: control
spec:
  ports:
    - name: http
      port: 8080
  selector:
    app: control
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: control-vs
spec:
  gateways:
  - travel-agency/travels-gateway
  hosts:
  - '*'
  http:
  - match:
    - uri:
        exact: /status
    route:
    - destination:
        host: control
        port:
          number: 8080
