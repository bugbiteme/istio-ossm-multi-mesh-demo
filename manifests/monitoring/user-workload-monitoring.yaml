# Enables the OpenShift user workload monitoring stack.
# This deploys a Prometheus instance in openshift-user-workload-monitoring
# that scrapes ServiceMonitors in user namespaces (including istio-system).
# Apply to BOTH clusters:
#   oc --context="${CTX_EAST}" apply -f manifests/monitoring/user-workload-monitoring.yaml
#   oc --context="${CTX_WEST}" apply -f manifests/monitoring/user-workload-monitoring.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-monitoring-config
  namespace: openshift-monitoring
data:
  config.yaml: |
    enableUserWorkload: true
