# Base kustomization for Bookinfo app. Apply order: namespace first, then
# ServiceAccounts, Services, Deployments, then Gateway/HTTPRoute.
# ArgoCD: use this directory as the source path with Kustomize tool.
# All resources (except the Namespace) set metadata.namespace: bookinfo in-file
# so the cluster-scoped Namespace resource is not modified by a namespace transformer.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: bookinfo
      app.kubernetes.io/component: app

# Order matters: namespace first so other resources can be created in it
resources:
  # 1. Namespace (cluster-scoped; must exist first)
  - bookinfo-ns.yaml
  # 2. ServiceAccounts (required by Deployments)
  - bookinfo-details-sa.yaml
  - bookinfo-ratings-sa.yaml
  - bookinfo-reviews-sa.yaml
  - bookinfo-productpage-sa.yaml
  # 3. Services
  - details-service.yaml
  - ratings-service.yaml
  - reviews-service.yaml
  - productpage-service.yaml
  # 4. Deployments
  - details-v1-deployment.yaml
  - ratings-v1-deployment.yaml
  - reviews-v1-deployment.yaml
  - reviews-v2-deployment.yaml
  - reviews-v3-deployment.yaml
  - productpage-v1-deployment.yaml
  # 5. Gateway API (depend on Services)
  - bookinfo-gw.yaml
  - productpage-httproute.yaml
