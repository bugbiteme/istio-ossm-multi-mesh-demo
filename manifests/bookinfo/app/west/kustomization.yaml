# West: base + ratings only. Namespace patched to topology.istio.io/network: network2.
# kubectl apply -k manifests/bookinfo/app/base
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base
  - ratings-service.yaml
  - ratings-v1-deployment.yaml

patches:
  - path: namespace-network2.yaml
    target:
      kind: Namespace
      name: bookinfo
