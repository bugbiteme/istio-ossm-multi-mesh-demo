apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratings-v1
  namespace: bookinfo
  labels:
    app: ratings
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ratings
      version: v1
  template:
    metadata:
      labels:
        app: ratings
        version: v1
    spec:
      serviceAccountName: bookinfo-ratings
      containers:
      - name: ratings
        # image: docker.io/istio/examples-bookinfo-ratings-v1:1.20.3
        image: quay.io/llevy/ratings:cluster
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9080
        env:
        - name: CLUSTER
          value: "CLUSTER-WEST"
