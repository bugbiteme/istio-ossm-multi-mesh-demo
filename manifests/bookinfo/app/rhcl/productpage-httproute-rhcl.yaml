apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bookinfo
  namespace: bookinfo
  labels:
    app: productpage
    
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: prod-gateway
    namespace: ingress-gateway
  hostnames:
  - bookinfo.demo.leonlevy.lol
  
  rules:
  - matches:
    - path:
        type: Exact
        value: /productpage
    - path:
        type: PathPrefix
        value: /static
    - path:
        type: Exact
        value: /login
    - path:
        type: Exact
        value: /logout
    - path:
        type: PathPrefix
        value: /api/v1/products
    backendRefs:
    - group: ""
      kind: Service
      name: productpage
      port: 9080
      weight: 1
