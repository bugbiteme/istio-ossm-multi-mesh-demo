apiVersion: v1
kind: Service
metadata:
  name: productpage
  namespace: bookinfo
  # Change this annotation to modify visibility across mesh boundaries.
  annotations:
    networking.istio.io/exportTo: '*'
  labels:
    app: productpage
    service: productpage
spec:
  ports:
  - port: 9080
    name: http
  selector:
    app: productpage
